<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataLibrary Home</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>
<body>
  <div class="settings-container">
    <i class="fas fa-cog settings-icon" onclick="toggleTCGSettingsModal()"></i>
  </div>

  <h1>The Websites Of DataLibrary</h1>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search..." />
  </div>

<div class="home-container">

<div id="settings-modal-tcg" class="modal hidden">
  <div class="modal-content">
    <span class="close-button" onclick="toggleTCGSettingsModal()">×</span>
    <h2>Settings</h2>

    <div class="switch-container">
      <label class="switch">
        <input
          type="checkbox"
          id="darkModeToggleModal"
        />
        <span class="slider"></span>
      </label>
      <span>Dark Mode</span>
    </div>

    <div class="social-button-container">
      <a
        href="https://discord.gg/t5BGDzzSXg"
        target="_blank"
        class="social-button discord"
        ><i class="fab fa-discord"></i
      ></a>
      <a
        href="https://median.co/share/jrkxbe#apk"
        target="_blank"
        class="social-button android"
        ><i class="fab fa-android"></i
      ></a>
    </div>
  </div>
</div>

  <main id="app"></main>

</div>

    <div class="copyright-container">
    <h5>© 2025 PokeLibrary. This website has been made by Cooper and Pepper.</h5>
  </div>

  <script src="script.js"></script>
</body>
</html>
